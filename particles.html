<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Topology - Gradient Flow</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
            cursor: move;
        }
        #formula-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            font-size: 12px;
            color: #444;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div id="formula-overlay">
        v = ∇Σ [ q_i / (|P - S_i|² + ε) ]<br>
        PARTICLES: 60,000 | DECAY: 0.04<br>
        DYNAMICS: GRADIENT_FOLLOW_INTEGRATION
    </div>

    <canvas id="quantumCanvas"></canvas>

    <script>
        /**
         * DYNAMICAL FIELD TOPOLOGY
         * Particles follow the gradient of the potential field.
         * Minimalist Egan-style rendering: 1px points + long decay.
         */
        const canvas = document.getElementById('quantumCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let angleX = 0.5, angleY = 0.4, scale = 1.0, time = 0;
        
        const BOX_SIZE = 1000;
        const NUM_PARTICLES = 60000;
        const SOURCES_COUNT = 5;
        const EPSILON = 500; 

        let sources = [];
        let particles = new Float32Array(NUM_PARTICLES * 3);
        let isDragging = false;
        let lastMouseX, lastMouseY;

        class Source {
            constructor() {
                this.seed = Math.random() * Math.PI * 2;
                this.qBase = (Math.random() > 0.5 ? 1 : -1) * 2000;
                this.freqX = 0.2 + Math.random() * 0.4;
                this.freqY = 0.3 + Math.random() * 0.5;
                this.freqZ = 0.4 + Math.random() * 0.6;
                this.x = 0; this.y = 0; this.z = 0;
            }
            update(t) {
                this.x = Math.sin(t * this.freqX + this.seed) * 150;
                this.y = Math.cos(t * this.freqY + this.seed) * 150;
                this.z = Math.sin(t * this.freqZ + this.seed) * 150;
                this.q = this.qBase * (0.5 + 0.5 * Math.sin(t * 2 + this.seed));
            }
        }

        function initParticles() {
            for (let i = 0; i < NUM_PARTICLES * 3; i++) {
                particles[i] = (Math.random() - 0.5) * BOX_SIZE;
            }
        }

        // Calculate the gradient vector ∇ϕ at point (x,y,z)
        function getGradient(px, py, pz) {
            let vx = 0, vy = 0, vz = 0;
            for (let s of sources) {
                let dx = px - s.x;
                let dy = py - s.y;
                let dz = pz - s.z;
                let r2 = dx*dx + dy*dy + dz*dz + EPSILON;
                
                // ∇(q/r²) = -2q * r / r^4
                let invR4 = s.q / (r2 * r2);
                vx -= dx * invR4;
                vy -= dy * invR4;
                vz -= dz * invR4;
            }
            return { x: vx * 10, y: vy * 10, z: vz * 10 };
        }

        function project(x, y, z) {
            let x1 = x * Math.cos(angleY) + z * Math.sin(angleY);
            let z1 = z * Math.cos(angleY) - x * Math.sin(angleY);
            let y2 = y * Math.cos(angleX) - z1 * Math.sin(angleX);
            let z2 = z1 * Math.cos(angleX) + y * Math.sin(angleX);
            const f = (800 * scale) / (1000 + z2);
            return { x: x1 * f + width/2, y: y2 * f + height/2, z: z2 };
        }

        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, width, height);
        }

        window.addEventListener('resize', resize);
        resize();
        initParticles();
        for (let i = 0; i < SOURCES_COUNT; i++) sources.push(new Source());

        function animate() {
            time += 0.01;
            
            // Slow zoom in effect
            scale += 0.002;
            
            // Temporal persistence - very low decay for structure buildup
            ctx.fillStyle = 'rgba(0, 0, 0, 0.04)';
            ctx.fillRect(0, 0, width, height);

            sources.forEach(s => s.update(time));

            // Set drawing style once
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';

            for (let i = 0; i < NUM_PARTICLES; i++) {
                let idx = i * 3;
                let px = particles[idx];
                let py = particles[idx+1];
                let pz = particles[idx+2];

                // Integrate position based on field gradient
                let g = getGradient(px, py, pz);
                particles[idx]   += g.x;
                particles[idx+1] += g.y;
                particles[idx+2] += g.z;

                // Brownian/Quantum jitter to prevent collapse into single points
                particles[idx]   += (Math.random() - 0.5) * 1.5;
                particles[idx+1] += (Math.random() - 0.5) * 1.5;
                particles[idx+2] += (Math.random() - 0.5) * 1.5;

                // Projection
                let proj = project(px, py, pz);

                // Boundary check or life cycle
                if (Math.random() > 0.999) {
                    particles[idx] = (Math.random() - 0.5) * BOX_SIZE;
                    particles[idx+1] = (Math.random() - 0.5) * BOX_SIZE;
                    particles[idx+2] = (Math.random() - 0.5) * BOX_SIZE;
                } else {
                    // Selective color based on velocity or field
                    if (i % 20 === 0) {
                        ctx.fillStyle = g.x > 0 ? 'rgba(0, 255, 255, 0.6)' : 'rgba(255, 0, 255, 0.6)';
                    } else {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    }
                    ctx.fillRect(proj.x, proj.y, 1, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        window.addEventListener('mousedown', (e) => { isDragging = true; lastMouseX = e.clientX; lastMouseY = e.clientY; });
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                angleY += (e.clientX - lastMouseX) * 0.01;
                angleX -= (e.clientY - lastMouseY) * 0.01;
                lastMouseX = e.clientX; lastMouseY = e.clientY;
            }
        });
        window.addEventListener('wheel', (e) => {
            scale = Math.max(0.1, Math.min(5.0, scale - e.deltaY * 0.001));
            e.preventDefault();
        }, { passive: false });

        animate();
    </script>
</body>
</html>
