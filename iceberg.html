<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural Iceberg Generator</title>
    <style>
        body { margin: 0; padding: 0; background: #000; }
        canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; }
        #scroll-content { position: relative; height: 400vh; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
// Procedural Iceberg Generator
// Uses Perlin noise, fractals, and mathematical geometry

var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');

// Canvas setup
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

var w = canvas.width;
var h = canvas.height;
var cx = w / 2;
var cy = h / 2;

// Noise and randomization
var seed = Math.random() * 65536;
var time = 0;
var scrollProgress = 0;

// Animation state
var animFrame = 0;
var running = true;

// Perlin noise implementation
function perlin(x, y, z) {
    var p = [151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,
        140,36,103,30,69,142,8,99,37,240,21,10,23,190,6,148,
        247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,
        57,177,33,88,237,149,56,87,174,20,125,136,171,168,68,175,
        74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,
        60,211,133,230,206,39,59,226,36,127,140,161,137,13,191,230,
        76,112,76,33,48,140,257,13,58,40,76,12,199,226,235,242,
        5,200,55,109,141,213,78,169,108,86,244,234,101,122,174,76,
        189,63,52,102,117,114,97,213,39,72,87,176,59,19,201,202,
        52,107,203,190,57,74,76,88,207,208,239,170,251,67,77,51,
        133,69,249,2,127,80,60,159,168,81,163,64,143,146,157,56,
        245,188,182,218,33,16,255,243,210,205,12,19,236,95,151,68,
        23,196,167,126,61,100,93,25,115,96,129,79,220,34,42,144,
        136,70,238,184,20,222,94,11,219,224,50,58,10,73,6,36,
        92,194,211,172,98,145,149,228,121,231,200,55,109,141,213,78,
        169,108,86,244,234,101,122,174,76,189,63,52,102,117,114,97];
    
    var xi = Math.floor(x) & 255;
    var yi = Math.floor(y) & 255;
    var zi = Math.floor(z) & 255;
    
    var xf = x - Math.floor(x);
    var yf = y - Math.floor(y);
    var zf = z - Math.floor(z);
    
    var u = xf * xf * (3 - 2 * xf);
    var v = yf * yf * (3 - 2 * yf);
    var w_fade = zf * zf * (3 - 2 * zf);
    
    var n000 = Math.sin(p[p[p[xi] + yi] + zi] * 0.0174533) * 0.25 + 0.25;
    var n100 = Math.sin(p[p[p[xi + 1] + yi] + zi] * 0.0174533) * 0.25 + 0.25;
    var n010 = Math.sin(p[p[p[xi] + yi + 1] + zi] * 0.0174533) * 0.25 + 0.25;
    var n110 = Math.sin(p[p[p[xi + 1] + yi + 1] + zi] * 0.0174533) * 0.25 + 0.25;
    var n001 = Math.sin(p[p[p[xi] + yi] + zi + 1] * 0.0174533) * 0.25 + 0.25;
    var n101 = Math.sin(p[p[p[xi + 1] + yi] + zi + 1] * 0.0174533) * 0.25 + 0.25;
    var n011 = Math.sin(p[p[p[xi] + yi + 1] + zi + 1] * 0.0174533) * 0.25 + 0.25;
    var n111 = Math.sin(p[p[p[xi + 1] + yi + 1] + zi + 1] * 0.0174533) * 0.25 + 0.25;
    
    var n00 = n000 * (1 - u) + n100 * u;
    var n10 = n010 * (1 - u) + n110 * u;
    var n01 = n001 * (1 - u) + n101 * u;
    var n11 = n011 * (1 - u) + n111 * u;
    
    var n0 = n00 * (1 - v) + n10 * v;
    var n1 = n01 * (1 - v) + n11 * v;
    
    return n0 * (1 - w_fade) + n1 * w_fade;
}

// Fractional Brownian motion
function fbm(x, y, octaves, persistence, lacunarity) {
    var value = 0;
    var amplitude = 1;
    var frequency = 1;
    var max = 0;
    
    for (var i = 0; i < octaves; i++) {
        value += amplitude * perlin(x * frequency, y * frequency, seed);
        max += amplitude;
        amplitude *= persistence;
        frequency *= lacunarity;
    }
    
    return value / max;
}

// 2D vector operations
function Vec2(x, y) {
    this.x = x || 0;
    this.y = y || 0;
}

Vec2.prototype.add = function(v) {
    return new Vec2(this.x + v.x, this.y + v.y);
};

Vec2.prototype.sub = function(v) {
    return new Vec2(this.x - v.x, this.y - v.y);
};

Vec2.prototype.mul = function(s) {
    return new Vec2(this.x * s, this.y * s);
};

Vec2.prototype.dot = function(v) {
    return this.x * v.x + this.y * v.y;
};

Vec2.prototype.mag = function() {
    return Math.sqrt(this.x * this.x + this.y * this.y);
};

Vec2.prototype.normalize = function() {
    var m = this.mag();
    if (m === 0) return new Vec2(0, 0);
    return new Vec2(this.x / m, this.y / m);
};

Vec2.prototype.rotate = function(angle) {
    var cos = Math.cos(angle);
    var sin = Math.sin(angle);
    return new Vec2(this.x * cos - this.y * sin, this.x * sin + this.y * cos);
};

// Generate iceberg profile using fractals
function generateIcebergProfile(depth, divisions) {
    var points = [];
    var baseWidth = 150;
    var waterline = h * 0.4;
    
    // Generate surface peaks
    for (var i = 0; i <= divisions; i++) {
        var t = i / divisions;
        var x = cx - baseWidth/2 + t * baseWidth;
        var noise = fbm(x * 0.01 + seed, time * 0.001, 3, 0.5, 2.0);
        var y = waterline - Math.abs(noise) * 60 - depth * 1.5;
        points.push(new Vec2(x, y));
    }
    
    return points;
}

// Generate underwater jagged formations
function generateUnderwaterStructure(depth, x, baseWidth) {
    var points = [];
    var waterline = h * 0.4;
    var divisionsPerLevel = Math.floor(8 + depth * 0.5);
    
    for (var i = 0; i <= divisionsPerLevel; i++) {
        var t = i / divisionsPerLevel;
        var xPos = x - baseWidth/2 + t * baseWidth;
        
        // Multiple octaves of noise for jagged appearance
        var noise1 = fbm(xPos * 0.003, depth * 0.015 + time * 0.0001, 3, 0.6, 2.1);
        var noise2 = fbm(xPos * 0.02, depth * 0.03, 2, 0.7, 2.0);
        
        var jag = (noise1 * 0.7 + noise2 * 0.3);
        var yPos = waterline + depth + jag * 60;
        
        points.push(new Vec2(xPos, yPos));
    }
    
    return points;
}

// Draw stroke with varying thickness
function strokePath(points, thickness, color) {
    if (points.length < 2) return;
    
    ctx.strokeStyle = color;
    ctx.lineWidth = thickness;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    
    for (var i = 1; i < points.length; i++) {
        ctx.lineTo(points[i].x, points[i].y);
    }
    ctx.stroke();
}

// Fill path
function fillPath(points, color) {
    if (points.length < 3) return;
    
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    
    for (var i = 1; i < points.length; i++) {
        ctx.lineTo(points[i].x, points[i].y);
    }
    ctx.lineTo(points[points.length - 1].x, h + 400);
    ctx.lineTo(points[0].x, h + 400);
    ctx.closePath();
    ctx.fill();
}

// Calculate ice coloration based on depth
function getIceColor(depth, scrollMix) {
    var depthRatio = Math.min(depth / 600, 1);
    var scrollRatio = Math.min(scrollProgress, 1);
    var mix = scrollRatio * 0.7 + depthRatio * 0.3;
    
    var r = Math.floor(255 * (1 - mix * 0.8));
    var g = Math.floor(200 * (1 - mix * 0.6));
    var b = Math.floor(255 * (1 - mix * 0.3));
    
    return 'rgb(' + r + ',' + g + ',' + b + ')';
}

// Render single iceberg layer
function renderLayer(depth, opacity) {
    var baseWidth = 250 - depth * 0.3;
    var waterline = h * 0.4;
    
    // Generate main body
    var profile = generateIcebergProfile(depth, 40);
    var underwater = generateUnderwaterStructure(depth, cx, baseWidth);
    
    // Fill with gradient
    var color = getIceColor(depth, scrollProgress);
    ctx.globalAlpha = opacity;
    fillPath(profile.concat(underwater), color);
    
    // Add edge detail
    ctx.globalAlpha = opacity * 0.6;
    strokePath(profile, 1.5, 'rgba(200,220,255,0.4)');
    
    ctx.globalAlpha = 1.0;
}

// Draw water surface
function renderWaterSurface() {
    var waterline = h * 0.4;
    var waveAmplitude = 2;
    var waveFreq = 0.02;
    
    ctx.strokeStyle = 'rgba(100,150,200,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    
    for (var x = 0; x <= w; x += 5) {
        var wave = Math.sin((x + time * 0.5) * waveFreq) * waveAmplitude;
        var y = waterline + wave;
        
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();
}

// Main render function
function render() {
    // Clear with gradient background
    var gradient = ctx.createLinearGradient(0, 0, 0, h);
    gradient.addColorStop(0, '#001a3d');
    gradient.addColorStop(0.3, '#003d6b');
    gradient.addColorStop(0.5 + scrollProgress * 0.3, '#0d0d1a');
    gradient.addColorStop(1, '#000000');
    
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, w, h);
    
    // Abyss darkness (before iceberg so it appears behind)
    ctx.globalAlpha = Math.min(scrollProgress * 0.8, 0.6);
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, h * 0.4 + 100, w, h);
    ctx.globalAlpha = 1;
    
    // Draw layers
    for (var i = 0; i < 8; i++) {
        var depth = i * 80;
        var opacity = Math.max(0.3, 1 - scrollProgress);
        renderLayer(depth, opacity);
    }
    
    // Draw water
    renderWaterSurface();
}

// Animation loop
function animate() {
    time += 1;
    
    // Update scroll progress
    var maxScroll = document.documentElement.scrollHeight - window.innerHeight;
    scrollProgress = maxScroll > 0 ? window.scrollY / maxScroll : 0;
    
    render();
    requestAnimationFrame(animate);
}

// Event listeners
window.addEventListener('resize', function() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    w = canvas.width;
    h = canvas.height;
    cx = w / 2;
    cy = h / 2;
});

window.addEventListener('scroll', function() {
    // Scroll progress updated in animate loop
});

// Extend page for scrolling
document.body.innerHTML += '<div id="scroll-content"></div>';
document.body.style.margin = '0';
document.body.style.backgroundColor = '#000';

// Start animation
animate();
    </script>
</body>
</html>
