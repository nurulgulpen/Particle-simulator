<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interstellar Dust Cloud – Infinite Zoom</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
            cursor: move;
        }
        #formula-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            font-size: 12px;
            color: #888;
            line-height: 1.4;
            text-shadow: 0 0 5px #000;
        }
    </style>
</head>
<body>

    <div id="formula-overlay">
        v = ∇Σ [ q_i / (|P - S_i|² + ε) ]<br>
        PARTICLES: 100,000 | SOURCES: 8<br>
        RENDER: ADDITIVE GLOW | ZOOM: UNLIMITED
    </div>

    <canvas id="quantumCanvas"></canvas>

    <!-- Optional ambient audio (ensure the file exists or replace the src) -->
    <audio id="backgroundAudio" loop preload="auto" style="display:none;">
        <source src="./Sleep Has Her House (Original Motion Picture Soundtrack) [P8umwTHWlyc].mp3" type="audio/mpeg">
    </audio>

    <script>
        (function() {
            const canvas = document.getElementById('quantumCanvas');
            const ctx = canvas.getContext('2d');

            let width, height;
            let angleX = 0.5, angleY = 0.4, scale = 1.0, time = 0;

            // ----- Simulation parameters -----
            const BOX_SIZE = 1200;                 // Larger initial spread
            const NUM_PARTICLES = 100000;
            const SOURCES_COUNT = 8;                // More sources = more structure
            const EPSILON = 400;                     // Smoothing factor

            let sources = [];
            let particles = new Float32Array(NUM_PARTICLES * 3);
            let isDragging = false;
            let lastMouseX, lastMouseY;

            // ----- Dynamic sources (attractors/repellers) -----
            class Source {
                constructor() {
                    this.seed = Math.random() * Math.PI * 2;
                    // Mix of positive and negative charges
                    this.qBase = (Math.random() > 0.5 ? 1 : -1) * (1500 + Math.random() * 1500);
                    this.freqX = 0.1 + Math.random() * 0.3;
                    this.freqY = 0.1 + Math.random() * 0.3;
                    this.freqZ = 0.1 + Math.random() * 0.3;
                    this.x = 0; this.y = 0; this.z = 0;
                }
                update(t) {
                    // Move sources in a Lissajous-like pattern
                    this.x = Math.sin(t * this.freqX + this.seed) * 200;
                    this.y = Math.cos(t * this.freqY + this.seed) * 200;
                    this.z = Math.sin(t * this.freqZ + this.seed) * 200;
                    // Modulate charge strength over time
                    this.q = this.qBase * (0.6 + 0.4 * Math.sin(t * 1.5 + this.seed));
                }
            }

            // ----- Initialize particles in a spherical cloud -----
            function initParticles() {
                for (let i = 0; i < NUM_PARTICLES; i++) {
                    let idx = i * 3;
                    // Start in a slightly clumpy sphere (radial distribution)
                    let r = Math.pow(Math.random(), 1.5) * BOX_SIZE * 0.5;
                    let theta = Math.acos(2 * Math.random() - 1);
                    let phi = 2 * Math.PI * Math.random();
                    particles[idx] = r * Math.sin(theta) * Math.cos(phi);
                    particles[idx+1] = r * Math.sin(theta) * Math.sin(phi);
                    particles[idx+2] = r * Math.cos(theta);
                }
            }

            // ----- Gradient of the scalar field ∇φ -----
            function getGradient(px, py, pz) {
                let vx = 0, vy = 0, vz = 0;
                for (let s of sources) {
                    let dx = px - s.x;
                    let dy = py - s.y;
                    let dz = pz - s.z;
                    let r2 = dx*dx + dy*dy + dz*dz + EPSILON;
                    // ∇(q / r²) = -2q * (dx,dy,dz) / r⁴
                    let factor = -2 * s.q / (r2 * r2);
                    vx += dx * factor;
                    vy += dy * factor;
                    vz += dz * factor;
                }
                return { x: vx * 12, y: vy * 12, z: vz * 12 }; // Slightly stronger flow
            }

            // ----- 3D to 2D projection (perspective) -----
            function project(x, y, z) {
                // Rotate around Y then X
                let x1 = x * Math.cos(angleY) + z * Math.sin(angleY);
                let z1 = z * Math.cos(angleY) - x * Math.sin(angleY);
                let y2 = y * Math.cos(angleX) - z1 * Math.sin(angleX);
                let z2 = z1 * Math.cos(angleX) + y * Math.sin(angleX);

                // Perspective factor: larger scale = stronger zoom
                const f = (600 * scale) / (800 + z2); // Adjusted for nicer depth
                return {
                    x: x1 * f + width/2,
                    y: y2 * f + height/2,
                    z: z2,
                    dist: z2 + 800  // used for size/dimming
                };
            }

            // ----- Resize canvas -----
            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resize);
            resize();

            // Setup sources
            for (let i = 0; i < SOURCES_COUNT; i++) sources.push(new Source());
            initParticles();

            // ----- Animation loop -----
            function animate() {
                time += 0.012;

                // Very slow fade (long trails) – creates a dense, cloudy appearance
                ctx.fillStyle = 'rgba(0, 0, 0, 0.02)';
                ctx.fillRect(0, 0, width, height);

                // Additive blending makes overlapping particles glow like interstellar dust
                ctx.globalCompositeOperation = 'lighter';

                sources.forEach(s => s.update(time));

                // Draw all particles
                for (let i = 0; i < NUM_PARTICLES; i++) {
                    let idx = i * 3;
                    let px = particles[idx];
                    let py = particles[idx+1];
                    let pz = particles[idx+2];

                    // Move particle according to gradient field
                    let g = getGradient(px, py, pz);
                    particles[idx]   += g.x;
                    particles[idx+1] += g.y;
                    particles[idx+2] += g.z;

                    // Tiny random jitter (reduced for smoother flows)
                    particles[idx]   += (Math.random() - 0.5) * 0.8;
                    particles[idx+1] += (Math.random() - 0.5) * 0.8;
                    particles[idx+2] += (Math.random() - 0.5) * 0.8;

                    // Occasionally respawn a particle to keep the cloud fresh
                    if (Math.random() > 0.9995) {
                        let r = Math.pow(Math.random(), 1.5) * BOX_SIZE * 0.5;
                        let theta = Math.acos(2 * Math.random() - 1);
                        let phi = 2 * Math.PI * Math.random();
                        particles[idx]   = r * Math.sin(theta) * Math.cos(phi);
                        particles[idx+1] = r * Math.sin(theta) * Math.sin(phi);
                        particles[idx+2] = r * Math.cos(theta);
                        continue; // skip drawing this frame for this particle
                    }

                    // Project to screen
                    let proj = project(px, py, pz);
                    if (proj.x < 0 || proj.x > width || proj.y < 0 || proj.y > height) continue; // off-screen

                    // Size and opacity based on distance (further = smaller/dimmer)
                    let distFactor = Math.max(0.2, 1.0 - (proj.dist - 400) / 2000);
                    let size = Math.max(1, 2.5 * distFactor);
                    let alpha = Math.min(1, 0.7 * distFactor + 0.2);

                    // Colour based on angle around Y-axis (creates a soft rainbow effect)
                    let hue = (Math.atan2(py, px) / (2*Math.PI) + 0.5 + time * 0.02) % 1.0;
                    ctx.fillStyle = `hsla(${hue * 360}, 90%, 70%, ${alpha})`;

                    // Draw as a small circle (slightly larger than 1px for a softer look)
                    ctx.beginPath();
                    ctx.arc(proj.x, proj.y, size * 0.8, 0, 2 * Math.PI);
                    ctx.fill();
                }

                // Reset composite operation for text overlays (if any)
                ctx.globalCompositeOperation = 'source-over';

                requestAnimationFrame(animate);
            }

            // ----- Interaction -----
            window.addEventListener('mousedown', (e) => {
                isDragging = true;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
            });
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    angleY += (e.clientX - lastMouseX) * 0.008;
                    angleX -= (e.clientY - lastMouseY) * 0.008;
                    lastMouseX = e.clientX;
                    lastMouseY = e.clientY;
                }
            });

            // ----- Zoom: no upper limit, only a small lower bound -----
            window.addEventListener('wheel', (e) => {
                scale = Math.max(0.05, scale - e.deltaY * 0.0015);
                e.preventDefault();
            }, { passive: false });

            // ----- Audio (optional) -----
            const audio = document.getElementById('backgroundAudio');
            const playAudio = () => {
                audio.volume = 0.4;
                audio.play().catch(e => console.log('Audio play failed (expected if file missing)'));
            };
            document.addEventListener('click', playAudio, { once: true });
            document.addEventListener('touchstart', playAudio, { once: true });

            console.log('Interstellar Dust Cloud – Zoom without limits');
            animate();
        })();
    </script>
</body>
</html>
